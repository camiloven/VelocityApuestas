<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card { background: #1e293b; border-left: 5px solid #38bdf8; padding: 15px; margin: 10px auto; border-radius: 8px; max-width: 400px; text-align: left; }
    </style>
</head>
<body>
    <h2>Velocity Apuestas</h2>
    <div class="tabs">
        <button class="tab-btn" onclick="show('results')">Hoy</button>
        <button class="tab-btn" onclick="show('history')">Historial</button>
    </div>
    <div id="results"></div>
    <div id="history" style="display:none;"></div>
    <script>
        function load(f, id) {
            fetch(f).then(r => r.json()).then(d => {
                document.getElementById(id).innerHTML = d.map(p => 
                    `<div class="card"><strong>${p.equipo}</strong><br>🔮 ${p.pronostico}</div>`
                ).join('');
            });
        }
        function show(id) {
            document.getElementById('results').style.display = (id === 'results') ? 'block' : 'none';
            document.getElementById('history').style.display = (id === 'history') ? 'block' : 'none';
        }
        load('picks.json', 'results');
        load('historial.json', 'history');
    </script>
</body>
</html>
