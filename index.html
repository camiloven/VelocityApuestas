<!DOCTYPE html>
<html>
<head><style>body { background: #121212; color: white; text-align: center; font-family: sans-serif; }</style></head>
<body>
    <h1>Velocity Apuestas</h1>
    <input type="date" id="datePicker" value="2026-06-20">
    <div id="results"></div>
    <script>
        const picker = document.getElementById('datePicker');
        picker.onchange = () => {
            fetch('/api/partidos?fecha=' + picker.value)
            .then(res => res.json())
            .then(data => {
                document.getElementById('results').innerHTML = data.map(p => 
                    '<p>' + p.equipo + '</p>').join('');
            });
        };
    </script>
</body>
</html>
