<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Apuestas</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 10px; }
        .card { background: #1e1e1e; border: 1px solid #00f2ff; margin: 15px auto; padding: 15px; border-radius: 12px; max-width: 400px; }
        .pronostico { color: #00ff88; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Velocity Apuestas</h1>
    <div id="lista-picks"></div>
    <script>
        fetch('picks.json').then(res => res.json()).then(data => {
            document.getElementById('lista-picks').innerHTML = data.map(p => 
                '<div class="card"><h3>' + p.equipo + '</h3><p>Fecha: ' + p.fecha + '</p><div class="pronostico">🔮 ' + p.pronostico + '</div></div>'
            ).join('');
        });
    </script>
</body>
</html>
