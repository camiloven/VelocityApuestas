<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Apuestas</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; }
        .card { background: #161616; border-left: 4px solid #00f2ff; padding: 15px; margin: 10px auto; border-radius: 4px; max-width: 400px; text-align: left; }
    </style>
</head>
<body>
    <h1>Velocity Apuestas</h1>
    <button class="tab-btn" onclick="show('results')">Hoy</button>
    <button class="tab-btn" onclick="show('history')">Historial</button>
    <div id="results"></div>
    <div id="history" style="display:none;"></div>
    <script>
        function loadData(file, id) {
            fetch(file).then(res => res.json()).then(data => {
                document.getElementById(id).innerHTML = data.map(p => 
                    '<div class="card"><h3>' + p.equipo + '</h3><p>🔮 ' + p.pronostico + '</p></div>'
                ).join('');
            });
        }
        function show(id) {
            document.getElementById('results').style.display = id === 'results' ? 'block' : 'none';
            document.getElementById('history').style.display = id === 'history' ? 'block' : 'none';
        }
        loadData('picks.json', 'results');
        loadData('historial.json', 'history');
    </script>
</body>
</html>
