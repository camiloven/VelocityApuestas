name: Actualizar Partidos
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Correr Script
        run: python app.py
      - name: Guardar cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add picks.json
          git commit -m "Auto-actualización de picks" || exit 0
          git push    - name: Commit y Push cambios
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add picks.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de picks" && git push)
        
